<div
  class="min-h-screen bg-black/50 w-screen flex items-center justify-center p-4"
>
  <div
    class="w-full max-w-md sm:max-w-lg md:max-w-xl lg:max-w-2xl bg-white rounded-xl shadow-lg p-6 sm:p-8 relative"
  >
    <div
      (click)="showAlertPage()"
      class="bg-gray-400 hover:bg-gray-500 w-8 h-8 flex items-center justify-center rounded-full text-white absolute top-3 right-3 cursor-pointer transition-colors duration-200"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </div>

    <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-6 text-center">
      Edit Product
    </h2>

    <form class="space-y-4">
      <div>
        <label class="block text-sm sm:text-base font-medium text-gray-700 mb-1"
          >¿Are you sure you should remove this element?</label
        >
      </div>
    </form>

    <div class="row flex items-center gap-3">
      <button
        (click)="deledCard(); showAlertPage()"
        type="submit"
        class="w-1/2 sm:px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 sm:py-3 rounded-lg transition-colors mt-4"
      >
        Yes
      </button>
      <button
        (click)="showAlertPage()"
        type="submit"
        class="w-1/2 sm:px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 sm:py-3 rounded-lg transition-colors mt-4"
      >
        No
      </button>
    </div>
  </div>
</div>
