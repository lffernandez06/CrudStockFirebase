<div
  class="min-h-screen bg-black/20 backdrop-blur-sm w-screen flex items-center justify-center p-4"
>
  <div
    class="w-full h-full max-w-none bg-white rounded-xl shadow-lg p-4 sm:p-6 md:p-8 relative m-3 sm:m-5 md:m-8 overflow-y-auto"
  >
    <div
      (click)="closeReview()"
      class="bg-gray-400 hover:bg-gray-500 w-8 h-8 flex items-center justify-center rounded-full text-white absolute top-3 right-3 cursor-pointer transition-colors duration-200"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </div>

    @if (productReview()) {
    <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-6 text-center">
      {{ productReview()?.name }}

      <!-- tabla -->
    <div
      class="my-4 w-full overflow-x-auto rounded-xl shadow-sm border border-gray-200"
    >
      <table class="w-full text-sm text-left text-gray-700">
        <!-- Header -->
        <thead class="bg-gray-100 text-gray-700 uppercase text-xs">
          <tr>
            <th class="px-6 py-4 font-semibold">Feature</th>

            <th class="px-6 py-4 font-semibold">Value</th>

            <th class="px-6 py-4 font-semibold text-center">Status</th>

            <th class="px-6 py-4 font-semibold text-center">Actions</th>
          </tr>
        </thead>

        <!-- Body -->
        <tbody class="divide-y divide-gray-200">
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 font-medium text-gray-900">Color</td>

            <td class="px-6 py-4 text-gray-600">Black</td>

            <td class="px-6 py-4 text-center">
              <span
                class="px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700"
              >
                Available
              </span>
            </td>

            <td class="px-6 py-4 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-3 transition">
                Edit
              </button>

              <button class="text-red-500 hover:text-red-700 transition">
                Delete
              </button>
            </td>
          </tr>

          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 font-medium text-gray-900">Material</td>

            <td class="px-6 py-4 text-gray-600">Aluminum</td>

            <td class="px-6 py-4 text-center">
              <span
                class="px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700"
              >
                Limited
              </span>
            </td>

            <td class="px-6 py-4 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-3">
                Edit
              </button>

              <button class="text-red-500 hover:text-red-700">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    </h2>
    }@else {
    <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-6 text-center">
      No product selected for review
    </h2>
    }




    <form class="space-y-4">
      <div>
        <label
          class="block text-sm sm:text-base font-medium text-gray-700 mb-1"
        ></label>
      </div>
    </form>
  </div>
</div>
