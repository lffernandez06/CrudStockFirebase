
<div
  class="mb-8 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg hover:shadow-xl transition-all duration-300"
>

  <!-- Header -->
  <div class="flex items-center justify-between border-b border-slate-200 bg-slate-50 px-6 py-4">

    <div>
      <h3 class="text-lg font-bold text-slate-800">
        {{ featureName() }}
      </h3>

      <p class="text-sm text-slate-500">
        {{ featureValues().length }} values available
      </p>
    </div>

    <span
      class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700"
    >
      Feature
    </span>

  </div>

  <!-- Table -->
  <div class="overflow-x-auto">

    <table class="w-full text-sm">

      <thead class="bg-slate-100 uppercase text-xs tracking-wider text-slate-600">
        <tr>

          <th class="px-6 py-4 text-left">
            {{ featureName() }}
          </th>

          <th class="px-6 py-4 text-center">
            Status
          </th>

          <th class="px-6 py-4 text-center">
            Actions
          </th>

        </tr>
      </thead>

      <tbody class="divide-y divide-slate-200">

        @for (value of featureValues(); track $index) {

        <tr class="hover:bg-blue-50 transition">

          <td class="px-6 py-4">

            <span
              class="inline-flex items-center rounded-full border border-blue-200 bg-blue-50 px-3 py-1 text-blue-700 font-semibold"
            >
              {{ value }}
            </span>

          </td>

          <td class="px-6 py-4 text-center">

            <span
              class="inline-flex items-center rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-700"
            >
              Available
            </span>

          </td>

          <td class="px-6 py-4">

            <div class="flex justify-center gap-3">

              <button
                class="rounded-lg border border-blue-200 bg-blue-50 px-4 py-2 text-blue-600 font-medium hover:bg-blue-100 transition"
              >
                Edit
              </button>

              <button
                class="rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-red-600 font-medium hover:bg-red-100 transition"
              >
                Delete
              </button>

            </div>

          </td>

        </tr>

        }

      </tbody>

    </table>

  </div>

</div>
